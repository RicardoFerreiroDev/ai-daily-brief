name: Generate AI Daily Brief with Gemini

on:
  schedule:
    - cron: "30 6 * * *" # 08:30 Madrid en horario de verano; 07:30 Madrid en invierno
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Generate report with Gemini
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: gemini-2.5-flash-lite
        run: python scripts/generate_report.py

      - name: Commit generated report
        run: |
          git config user.name "ai-daily-bot"
          git config user.email "ai-daily-bot@users.noreply.github.com"
          git add data/
          git commit -m "Update AI Daily Brief" || echo "No report changes to commit"
          git push || echo "Nothing to push"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install frontend dependencies
        run: npm install

      - name: Build site
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
